name: Quarto Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      # ── Cache: R-Pakete zwischen Runs wiederverwenden ──────────────────
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('**/DESCRIPTION', '.github/workflows/quarto-publish.yml') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e '
            pkgs <- c("knitr", "rmarkdown", "tidyverse", "haven",
                      "sjPlot", "sjmisc", "psych", "rstatix",
                      "naniar", "patchwork", "RColorBrewer")
            missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(missing) > 0) {
              install.packages(missing, repos = "https://cloud.r-project.org")
            } else {
              message("Alle Pakete bereits im Cache – keine Installation nötig.")
            }
          '

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
