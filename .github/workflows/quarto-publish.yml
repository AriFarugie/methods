name: Quarto Publish
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('r-packages.txt') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e '
            lib <- Sys.getenv("R_LIBS_USER")
            dir.create(lib, showWarnings = FALSE, recursive = TRUE)
            .libPaths(lib)
            pkgs <- readLines("r-packages.txt")
            pkgs <- pkgs[nchar(trimws(pkgs)) > 0]
            missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(missing) > 0) {
              install.packages(missing,
                               lib = lib,
                               repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest")
            } else {
              message("Alle Pakete bereits im Cache – keine Installation noetig.")
            }
          '

      - name: Set R library path for Quarto
        run: |
          echo '.libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths()))' > .Rprofile

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      # ── StaticCrypt: NACH dem Rendern, VOR dem Publishen ──────────────
      - name: Install StaticCrypt
        run: npm install -g staticrypt

      # Workshop 1
      - name: Encrypt Workshop 1 – Tag 1
        run: |
          staticrypt _site/workshops/ws1/day1.html \
            --password "${{ secrets.WS1_PASSWORD }}" \
            --directory _site/workshops/ws1/ \
            --short \
            --template-title "Einführung in R & RStudio – Tag 1" \
            --template-instructions "Bitte gib das Workshop-Passwort ein."

      - name: Encrypt Workshop 1 – Tag 2
        run: |
          staticrypt _site/workshops/ws1/day2.html \
            --password "${{ secrets.WS1_PASSWORD }}" \
            --directory _site/workshops/ws1/ \
            --short \
            --template-title "Einführung in R & RStudio – Tag 2" \
            --template-instructions "Bitte gib das Workshop-Passwort ein."

      # Workshop 2
      - name: Encrypt Workshop 2 – Tag 1
        run: |
          staticrypt _site/workshops/ws2/day1.html \
            --password "${{ secrets.WS2_PASSWORD }}" \
            --directory _site/workshops/ws2/ \
            --short \
            --template-title "Datenvisualisierung mit ggplot2 – Tag 1" \
            --template-instructions "Bitte gib das Workshop-Passwort ein."

      - name: Encrypt Workshop 2 – Tag 2
        run: |
          staticrypt _site/workshops/ws2/day2.html \
            --password "${{ secrets.WS2_PASSWORD }}" \
            --directory _site/workshops/ws2/ \
            --short \
            --template-title "Datenvisualisierung mit ggplot2 – Tag 2" \
            --template-instructions "Bitte gib das Workshop-Passwort ein."

      # Workshop 3 – Beispiel für zukünftige Erweiterung:
      # - name: Encrypt Workshop 3 – Tag 1
      #   run: |
      #     staticrypt _site/workshops/ws3/day1.html \
      #       --password "${{ secrets.WS3_PASSWORD }}" \
      #       --directory _site/workshops/ws3/ \
      #       --short \
      #       --template-title "Workshop 3 – Tag 1" \
      #       --template-instructions "Bitte gib das Workshop-Passwort ein."

      # ── Publish: _site direkt pushen (mit verschlüsselten Dateien) ────
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
